{% if messages %}
<div class="mb-4 space-y-2" role="status" aria-live="polite">
  {% for message in messages %}
  <div
    class="rounded-2xl border px-4 py-3 text-[13px] font-semibold {% if message.tags == 'error' %}border-rose-200 bg-rose-50 text-rose-900{% elif message.tags == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-900{% else %}border-slate-200 bg-slate-50 text-slate-800{% endif %}">
    {{ message }}
  </div>
  {% endfor %}
</div>
{% endif %}
